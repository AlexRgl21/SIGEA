<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEA | Asignación de Horarios</title>
    
    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/asignaciones.css">
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-container">
            <img src="../static/img/logo_sigea.png">
        </div>
        <nav class="menu">
            <ul>
                <li><a href="{{ url_for('panel.inicio') }}">Panel Principal</a></li>
                <li><a href="{{ url_for('gestion.vista_gestion') }}">Gestión de Aulas</a></li>
                <li class="active"><a href="#">Asignación de Horarios</a></li>
                <li><a href="#">Reservas Especiales</a></li>
                <li><a href="{{ url_for('usuarios.lista_usuarios') }}">Usuarios</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        
        <header class="top-bar">
            <div class="page-title">
                <h1>Asignación de Horarios Académicos</h1>
            </div>
            <div class="user-profile" style="display: flex; align-items: center; gap: 15px;">
                <input type="text" class="search-input" placeholder="Buscar..." style="padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
                <span class="user-name">Coordinación Académica</span>
                <a href="{{ url_for('auth.logout') }}" class="btn-danger" style="text-decoration: none; text-align: center;">Salir</a>
            </div>
        </header>

        <section class="workspace">
            <div class="workspace-split">
                
                <div class="calendar-container">
                    
                    <div class="calendar-controls">
                        <h3 style="margin: 0; color: #333;">Calendario Semanal por Espacio</h3>
                        
                        <div class="filters-group">
                            <label>Edificio</label>
                            <select>
                                <option>Edificio 1</option>
                                <option selected>Edificio 2</option>
                            </select>
                            
                            <label>Salón</label>
                            <select>
                                <option>Salón 1</option>
                                <option>Salón 2</option>
                                <option selected>Salón 3</option>
                            </select>

                            <button class="btn-toggle-form" onclick="toggleFormularioAsignacion()">+ Nueva Asignación</button>
                        </div>
                    </div>

                    <div id='calendar'></div>
                </div>

                <div class="form-container" id="panel-asignacion" style="display: none;">
                    <h3 class="section-title">Nueva Asignación Rápida</h3>
                    
                    <form id="form-asignacion" onsubmit="event.preventDefault(); alert('Modo Demo: Asignación registrada para presentación.');">
                        <div class="form-group">
                            <label>Grupo:</label>
                            <input type="text" placeholder="Ej. ITIID 01">
                        </div>

                        <div class="form-group">
                            <label>Días:</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox"> L</label>
                                <label><input type="checkbox"> M</label>
                                <label><input type="checkbox"> X</label>
                                <label><input type="checkbox"> J</label>
                                <label><input type="checkbox"> V</label>
                                <label><input type="checkbox"> S</label>
                            </div>
                        </div>

                        <div class="form-group" style="display: flex; gap: 10px;">
                            <div style="flex: 1;">
                                <label>Hora Inicio:</label>
                                <input type="time" value="07:00">
                            </div>
                            <div style="flex: 1;">
                                <label>Hora Fin:</label>
                                <input type="time" value="09:00">
                            </div>
                        </div>

                        <button type="submit" class="btn-submit">Registrar Asignación</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script>
        var calendar; 
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                hiddenDays: [0], // Ocultamos el domingo
                slotMinTime: '07:00:00',
                slotMaxTime: '20:00:00',
                locale: 'es',
                headerToolbar: false,
                contentHeight: 'auto',
                
                
                events: [
                    {
                        title: 'ITIID 01',
                        daysOfWeek: [1, 2, 3, 4, 5], 
                        startTime: '07:00:00',
                        endTime: '11:00:00',
                        color: '#17a2b8'
                    },
                    {
                        title: '6A5',
                        daysOfWeek: [1,2, 3, 4, 5], 
                        startTime: '11:00:00',
                        endTime: '13:00:00',
                        color: '#004a98'
                    },
                    {
                        // Choque de horarios falso para la demo
                        title: 'CONFLICTO DETECTADO\nGrupo ISA-43',
                        daysOfWeek: [3], // Miércoles
                        startTime: '11:00:00',
                        endTime: '13:00:00',
                        color: '#dc3545',
                        display: 'block'
                    }
                ]
            });

            calendar.render();
        });

        function toggleFormularioAsignacion() {
            var panel = document.getElementById("panel-asignacion");
            if (panel.style.display === "none" || panel.style.display === "") {
                panel.style.display = "block";
            } else {
                panel.style.display = "none";
            }
            
            setTimeout(function() {
                calendar.updateSize();
            }, 100);
        }
    </script>
</body>
</html>
